global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: backend
    metrics_path: /metrics
    dns_sd_configs:
      - names: ["backend"]
        type: A
        port: 8080

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
