services:
  postgres_db:
    image: postgres:${POSTGRES_VERSION}
    container_name: keeneye_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres_db:5432/${DB_NAME}?sslmode=disable
      - MIGRATE_ONLY=1
    depends_on:
      postgres_db:
        condition: service_healthy
    restart: "no"
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres_db:5432/${DB_NAME}?sslmode=disable
      - SKIP_MIGRATIONS=1
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL=${JWT_ACCESS_TTL:-15m}
      - JWT_REFRESH_TTL=${JWT_REFRESH_TTL:-168h}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - APP_ENV=${APP_ENV:-development}
      - SEED_DEV_DATA=${SEED_DEV_DATA:-true}
      - DEV_SEED_PASSWORD=${DEV_SEED_PASSWORD:-DevPassword1!}
      - REGISTRATION_LINK_TTL=${REGISTRATION_LINK_TTL:-24h}
      - REGISTRATION_BASE_URL=${REGISTRATION_BASE_URL:-http://localhost}
      - EMAIL_RETRY_BACKEND=${EMAIL_RETRY_BACKEND:-worker}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-kafka:9092}
      - KAFKA_EMAIL_TOPIC=${KAFKA_EMAIL_TOPIC:-registration-email-retry}
      - KAFKA_CONSUMER_GROUP=${KAFKA_CONSUMER_GROUP:-registration-email}
      - EMAIL_RETRY_MAX_ATTEMPTS=${EMAIL_RETRY_MAX_ATTEMPTS:-5}
      - EMAIL_RETRY_SIMULATE_FAILURE_RATE=${EMAIL_RETRY_SIMULATE_FAILURE_RATE:-0.3}
      - EXPIRATION_WORKER_INTERVAL=${EXPIRATION_WORKER_INTERVAL:-30s}
      - EMAIL_RETRY_WORKER_INTERVAL=${EMAIL_RETRY_WORKER_INTERVAL:-15s}
      - MAILER_TYPE=${MAILER_TYPE:-log}
    depends_on:
      postgres_db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: keeneye_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    command:
      - --nginx.scrape-uri=http://nginx/stub_status
    depends_on:
      - nginx
    networks:
      - app-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgres://${DB_USER}:${DB_PASSWORD}@postgres_db:5432/${DB_NAME}?sslmode=disable
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: keeneye_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - backend
      - nginx-exporter
      - postgres-exporter
    networks:
      - app-network

  loki:
    image: grafana/loki:3.4.2
    container_name: keeneye_loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - app-network

  promtail:
    image: grafana/promtail:3.4.2
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - app-network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: keeneye_grafana
    ports:
      - "${GRAFANA_PORT:-3300}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - app-network

  kafka:
    image: apache/kafka:3.9.0
    container_name: keeneye_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pg_data:
  prometheus_data:
  loki_data:
  grafana_data:
