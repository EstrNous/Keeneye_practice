name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: keeneye
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d keeneye"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Verify sqlc generated code
        working-directory: backend
        run: sqlc diff

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/keeneye?sslmode=disable
          JWT_SECRET: test-secret
        run: go test ./... -count=1

      - name: Vet
        working-directory: backend
        run: go vet ./...
